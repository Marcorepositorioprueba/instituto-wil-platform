<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Wilhelm Wundt</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/dynamic_background.css">
    <link rel="stylesheet" href="assets/text_effects.css">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marcorepositorioprueba.github.io/wil-language-institute-website/index.html">
    <meta property="og:title" content="Instituto Wilhelm Wundt - Language School">
    <meta property="og:description" content="Unlock your potential with immersive English and German language programs. Expert instructors, personalized learning, and a vibrant community.">
    <meta property="og:image" content="https://marcorepositorioprueba.github.io/wil-language-institute-website/imagenes/will_transparent.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marcorepositorioprueba.github.io/wil-language-institute-website/index.html">
    <meta property="twitter:title" content="Instituto Wilhelm Wundt - Language School">
    <meta property="twitter:description" content="Unlock your potential with immersive English and German language programs. Expert instructors, personalized learning, and a vibrant community.">
    <meta property="twitter:image" content="https://marcorepositorioprueba.github.io/wil-language-institute-website/imagenes/will_transparent.png">
</head>
<body>

    <div class="hero-container-dynamic">
        <!-- Slides de fondo -->
        <div class="hero-background-slide"></div>
        <div class="hero-background-slide"></div>

        <!-- Contenido superpuesto -->
        <div class="hero-overlay">
            <div class="hero-content">
                <div class="light-sweep">
                    <img src="imagenes/will_transparent.png" alt="Instituto Wilhelm Wundt Logo" class="hero-logo">
                    <h1>Language School</h1>
                </div>
                <p id="illuminated-text" class="illuminated-text">Pioneering Excellence in Language</p>
                <div class="welcome-frame-container">
                    <span class="welcome-text">Welcome!!!</span>
                    <a href="about.html" class="hero-button">Enter</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textElement = document.getElementById('illuminated-text');
            const text = textElement.innerText;
            textElement.innerHTML = ''; // Limpiar el párrafo

            // Envolver cada letra en un span
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.innerText = text[i] === ' ' ? '\u00A0' : text[i]; // Usar espacio sin ruptura
                textElement.appendChild(span);
            }

            const spans = textElement.querySelectorAll('span');
            let delay = 100; // Milisegundos entre cada letra

            function illuminate() {
                spans.forEach((span, index) => {
                    setTimeout(() => {
                        span.classList.add('illuminated');
                    }, index * delay);
                });

                // Apagar las luces después de un tiempo para reiniciar el ciclo
                setTimeout(() => {
                    spans.forEach(span => span.classList.remove('illuminated'));
                }, (spans.length * delay) + 3000); // Duración total + 3s de pausa
            }

            // Iniciar la animación y repetirla
            illuminate();
            setInterval(illuminate, (spans.length * delay) + 4000); // Repetir cada ciclo completo + 4s
        });
    </script>

    

</body>
</html>
