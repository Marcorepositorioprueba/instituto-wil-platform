<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Prospectos - Wilhelm Wundt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* HEADER CRM */
        .crm-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { width: 60px; background: white; padding: 5px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-box h2 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f9f9f9; padding: 25px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 11px; text-transform: uppercase; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 13px; }
        
        .btn { padding: 12px 25px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 13px; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-gold { background: var(--gold); color: var(--dark); }
        .btn-back { background: #eee; color: #555; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: var(--dark); color: var(--gold); padding: 15px; text-align: left; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #fffcf0; }

        .matricula-tag { font-family: monospace; background: #eee; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #333; }
        .score-tag { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        @media print {
            .no-print { display: none !important; }
            .container { box-shadow: none; border: none; padding: 0; }
            th { background: #eee !important; color: black !important; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="crm-header">
            <div class="logo-box">
                <img src="../willogo.jpg" alt="Wilhelm Wundt">
                <div>
                    <h2>WILHELM WUNDT</h2>
                    <p style="margin:0; font-size: 0.7rem; color: var(--gold); font-weight: 700;">INSTITUTIONAL CRM DASHBOARD</p>
                </div>
            </div>
            <div class="no-print">
                <a href="../boveda_proposal.html" class="btn btn-back"><i class="fas fa-arrow-left"></i> REGRESAR</a>
                <button class="btn btn-dark" onclick="window.print()"><i class="fas fa-print"></i> IMPRIMIR REPORTE</button>
            </div>
        </div>
        
        <div class="form-grid no-print">
            <div>
                <label>Matrícula No.</label>
                <input type="text" id="matricula" placeholder="WW-2026-001">
            </div>
            <div>
                <label>Nombre del Prospecto</label>
                <input type="text" id="nombre" placeholder="Nombre Completo">
            </div>
            <div>
                <label>Idioma</label>
                <select id="idioma">
                    <option value="Inglés">Inglés</option>
                    <option value="Francés">Francés</option>
                    <option value="Alemán">Alemán</option>
                </select>
            </div>
            <div>
                <label>Apply Test Score</label>
                <input type="text" id="score" placeholder="Ej. 45/60">
            </div>
            <div>
                <label>Nivel Sugerido</label>
                <select id="nivel">
                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="B1">B1</option>
                    <option value="B2">B2</option>
                </select>
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button class="btn btn-gold" onclick="agregarProspecto()" style="width: 100%; justify-content: center;">
                    <i class="fas fa-plus-circle"></i> REGISTRAR
                </button>
            </div>
        </div>

        <table id="tabla-prospectos">
            <thead>
                <tr>
                    <th>Matrícula</th>
                    <th>Nombre</th>
                    <th>Idioma</th>
                    <th>Test Score</th>
                    <th>Nivel</th>
                    <th>Fecha Registro</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="matricula-tag">WW-2026-001</span></td>
                    <td><strong>Marco Aurelio</strong></td>
                    <td>Inglés</td>
                    <td><span class="score-tag">48/60</span></td>
                    <td><span style="font-weight: 700;">B1</span></td>
                    <td>20/04/2026</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function agregarProspecto() {
            const matricula = document.getElementById('matricula').value;
            const nombre = document.getElementById('nombre').value;
            const idioma = document.getElementById('idioma').value;
            const score = document.getElementById('score').value;
            const nivel = document.getElementById('nivel').value;
            const fecha = new Date().toLocaleDateString();

            if(!nombre || !matricula) {
                alert("Por favor ingrese Matrícula y Nombre.");
                return;
            }

            const tabla = document.getElementById('tabla-prospectos').getElementsByTagName('tbody')[0];
            const nuevaFila = tabla.insertRow();

            nuevaFila.innerHTML = `
                <td><span class="matricula-tag">${matricula}</span></td>
                <td><strong>${nombre}</strong></td>
                <td>${idioma}</td>
                <td><span class="score-tag">${score || 'N/A'}</span></td>
                <td><span style="font-weight: 700;">${nivel}</span></td>
                <td>${fecha}</td>
            `;

            // Limpiar campos
            document.getElementById('matricula').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('score').value = '';
        }
    </script>
</body>
</html>
