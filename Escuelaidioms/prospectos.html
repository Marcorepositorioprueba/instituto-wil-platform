<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Prospectos - Wilhelm Wundt</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f9f9f9; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a1a1a; border-left: 5px solid #d4af37; padding-left: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; background: #f4f4f4; padding: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-add { background: #1a1a1a; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #d4af37; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #1a1a1a; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }

        @media print {
            .btn-add, .form-grid, .no-print { display: none; }
            .container { box-shadow: none; width: 100%; max-width: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Lista de Prospectos</h1>
            <button class="btn-add no-print" onclick="window.print()"><i class="fas fa-print"></i> Imprimir Reporte</button>
        </div>
        
        <div class="form-grid">
            <div>
                <label>Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
            </div>
            <div>
                <label>Idioma</label>
                <select id="idioma">
                    <option value="Inglés">Inglés</option>
                    <option value="Alemán">Alemán</option>
                    <option value="Francés">Francés</option>
                </select>
            </div>
            <div>
                <label>Nivel de Interés</label>
                <select id="nivel">
                    <option value="A1">A1 (Principiante)</option>
                    <option value="A2">A2 (Básico)</option>
                    <option value="B1">B1 (Intermedio)</option>
                    <option value="B2">B2 (Avanzado)</option>
                </select>
            </div>
            <div>
                <label>Teléfono / WhatsApp</label>
                <input type="text" id="contacto" placeholder="771...">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button class="btn-add" onclick="agregarProspecto()">Agregar a Lista</button>
            </div>
        </div>

        <table id="tabla-prospectos">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Nombre</th>
                    <th>Idioma</th>
                    <th>Nivel</th>
                    <th>Contacto</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody>
                <!-- Filas dinámicas -->
            </tbody>
        </table>
    </div>

    <script>
        function agregarProspecto() {
            const nombre = document.getElementById('nombre').value;
            const idioma = document.getElementById('idioma').value;
            const nivel = document.getElementById('nivel').value;
            const contacto = document.getElementById('contacto').value;
            const fecha = new Date().toLocaleDateString();

            if(!nombre || !contacto) {
                alert("Por favor llene los campos obligatorios.");
                return;
            }

            const tabla = document.getElementById('tabla-prospectos').getElementsByTagName('tbody')[0];
            const nuevaFila = tabla.insertRow();

            nuevaFila.innerHTML = `
                <td>${fecha}</td>
                <td>${nombre}</td>
                <td>${idioma}</td>
                <td>${nivel}</td>
                <td>${contacto}</td>
                <td>Pendiente de Examen</td>
            `;

            // Limpiar
            document.getElementById('nombre').value = '';
            document.getElementById('contacto').value = '';
        }
    </script>
</body>
</html>
