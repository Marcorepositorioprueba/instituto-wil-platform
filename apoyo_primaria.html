<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementary - Math Challenge - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <style>
        /* Specific styles for the Math Challenge */
        .math-challenge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 600px;
            margin: 30px auto;
            background-color: var(--wundt-white);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        #problem {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--wundt-text);
            margin-bottom: 20px;
        }

        #answerInput {
            padding: 10px 15px;
            font-size: 1.5rem;
            width: 150px;
            border: 2px solid var(--wundt-gray-medium);
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
        }

        #answerInput:focus {
            outline: none;
            border-color: var(--wundt-red);
        }

        #submitAnswer {
            padding: 12px 25px;
            font-size: 1.2rem;
            background-color: var(--wundt-red);
            color: var(--wundt-white);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 15px;
        }

        #submitAnswer:hover {
            background-color: #e74c3c;
        }

        #feedback {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 10px;
            min-height: 30px; /* To prevent layout shift */
        }

        .correct {
            color: #28a745; /* Green */
        }

        .incorrect {
            color: #dc3545; /* Red */
        }

        #newProblem {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: var(--wundt-yellow);
            color: var(--wundt-text);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        #newProblem:hover {
            background-color: #f39c12;
        }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <section id="primaria-math">
            <h2>Math Challenge</h2>
            <p style="text-align: center; font-size: 1.1em; color: #555; margin-bottom: 30px;">Solve the problems and improve your skills!</p>

            <div class="math-challenge-container">
                <div id="problem"></div>
                <input type="number" id="answerInput" placeholder="Your answer">
                <button id="submitAnswer">Check</button>
                <div id="feedback"></div>
                <button id="newProblem">New Problem</button>
            </div>
        </section>
        <div class="back-button-container">
            <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const problemEl = document.getElementById('problem');
            const answerInput = document.getElementById('answerInput');
            const submitAnswerBtn = document.getElementById('submitAnswer');
            const feedbackEl = document.getElementById('feedback');
            const newProblemBtn = document.getElementById('newProblem');

            let currentAnswer;

            function generateProblem() {
                const num1 = Math.floor(Math.random() * 10) + 1; // Numbers from 1 to 10
                const num2 = Math.floor(Math.random() * 10) + 1;
                const operation = ['+', '-', '*'][Math.floor(Math.random() * 3)]; // Random operation

                let problemString;
                switch (operation) {
                    case '+':
                        currentAnswer = num1 + num2;
                        problemString = `${num1} + ${num2} = ?`;
                        break;
                    case '-':
                        // Ensure result is not negative for simplicity
                        if (num1 < num2) {
                            [num1, num2] = [num2, num1]; // Swap to ensure num1 >= num2
                        }
                        currentAnswer = num1 - num2;
                        problemString = `${num1} - ${num2} = ?`;
                        break;
                    case '*':
                        currentAnswer = num1 * num2;
                        problemString = `${num1} x ${num2} = ?`;
                        break;
                }
                problemEl.textContent = problemString;
                answerInput.value = '';
                feedbackEl.textContent = '';
                feedbackEl.className = ''; // Clear feedback classes
                answerInput.focus();
            }

            function checkAnswer() {
                const userAnswer = parseInt(answerInput.value);
                if (isNaN(userAnswer)) {
                    feedbackEl.textContent = 'Please enter a number.';
                    feedbackEl.className = 'incorrect';
                    return;
                }

                if (userAnswer === currentAnswer) {
                    feedbackEl.textContent = 'Correct!';
                    feedbackEl.className = 'correct';
                } else {
                    feedbackEl.textContent = `Incorrect. The correct answer was ${currentAnswer}.`;
                    feedbackEl.className = 'incorrect';
                }
            }

            submitAnswerBtn.addEventListener('click', checkAnswer);
            newProblemBtn.addEventListener('click', generateProblem);
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });

            // Initial problem generation
            generateProblem();
        });
    </script>
</body>
</html>
