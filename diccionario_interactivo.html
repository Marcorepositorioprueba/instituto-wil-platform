<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Dictionary - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #5D4037;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 40px 40px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            margin: 30px auto;
            text-align: center;
            border: 3px solid #fff;
        }
        h1.title-magic {
            font-family: 'Comic Neue', cursive;
            color: #FF6F61;
            margin-bottom: 25px;
            font-size: 2.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            transform: scale(1.05);
        }
        #word-input {
            flex-grow: 1;
            padding: 15px;
            border: 2px solid #FFC107;
            border-radius: 30px;
            font-size: 1.1em;
            transition: all 0.3s;
            text-align: center;
        }
        #word-input:focus {
            border-color: #FF6F61;
            box-shadow: 0 0 12px rgba(255,111,97,0.3);
            outline: none;
        }
        #search-btn {
            padding: 15px 25px;
            background-color: #FFC107;
            color: #5D4037;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s;
        }
        #search-btn:hover {
            background-color: #FFA000;
            transform: scale(1.1);
        }
        .result {
            text-align: left;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result h2 {
            font-family: 'Comic Neue', cursive;
            color: #00796B;
            font-size: 2.2em;
        }
        .audio-player {
            margin: 15px 0;
            width: 100%;
        }
        .definition-card {
            background: #FFFDE7;
            border-left: 5px solid #FFC107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1 class="title-magic">Magic Dictionary</h1>
            <p style="margin-bottom: 25px; color: #555;">Hello! Type a word in English and discover its magic.</p>
            <div class="search-box">
                <input type="text" id="word-input" placeholder="e.g. 'magic', 'sun', 'happy'...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div id="result" class="result"></div>
            <div class="back-button-container">
                <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const wordInput = document.getElementById('word-input');
            const searchBtn = document.getElementById('search-btn');
            const resultDiv = document.getElementById('result');

            const searchWord = () => {
                const word = wordInput.value.trim();
                if (!word) {
                    resultDiv.innerHTML = '<p class="error">Oops! You forgot to type a magic word.</p>';
                    return;
                }

                resultDiv.innerHTML = '<p>Searching the spellbook...</p>';

                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('We couldn\'t find that word. Did you spell it correctly?');
                        }
                        return response.json();
                    })
                    .then(data => {
                        displayResult(data[0]);
                    })
                    .catch(error => {
                        resultDiv.innerHTML = `<p class="error">${error.message}</p>`;
                    });
            };

            const displayResult = (wordData) => {
                resultDiv.innerHTML = '';

                const wordTitle = document.createElement('h2');
                wordTitle.textContent = wordData.word;
                resultDiv.appendChild(wordTitle);

                const audioSrc = wordData.phonetics.find(p => p.audio)?.audio;
                if (audioSrc) {
                    const audioPlayer = document.createElement('audio');
                    audioPlayer.controls = true;
                    audioPlayer.src = audioSrc;
                    audioPlayer.className = 'audio-player';
                    resultDiv.appendChild(audioPlayer);
                }

                wordData.meanings.forEach(meaning => {
                    meaning.definitions.forEach((def) => {
                        const definitionCard = document.createElement('div');
                        definitionCard.className = 'definition-card';

                        const partOfSpeech = document.createElement('h3');
                        partOfSpeech.innerHTML = `<i class="fas fa-book-open"></i> ${meaning.partOfSpeech}`;
                        definitionCard.appendChild(partOfSpeech);

                        const definitionEnP = document.createElement('p');
                        definitionEnP.innerHTML = `<strong>Definition:</strong> ${def.definition}`;
                        definitionCard.appendChild(definitionEnP);

                        if (def.example) {
                            const exampleP = document.createElement('p');
                            exampleP.innerHTML = `<em>Example: ${def.example}</em>`;
                            definitionCard.appendChild(exampleP);
                        }

                        resultDiv.appendChild(definitionCard);
                    });
                });
            };

            searchBtn.addEventListener('click', searchWord);
            wordInput.addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    searchWord();
                }
            });
        });
    </script>
</body>
</html>
