<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Dictation - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            margin: 20px auto;
            text-align: center;
            border: 3px solid #fff;
        }
        h1.title-magic {
            font-family: 'Comic Neue', cursive;
            color: #6a11cb;
            margin-bottom: 20px;
            font-size: 2.8em;
        }
        .level-selector {
            margin-bottom: 20px;
        }
        .level-selector label {
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
        }
        .level-selector select {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.1em;
            margin-left: 10px;
        }
        .dictation-controls button {
            background-color: #8e44ad;
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 2.5em;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .dictation-controls button:hover {
            background-color: #9b59b6;
            transform: scale(1.1);
        }
        .answer-section {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        #answer {
            flex-grow: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.2em;
        }
        #check-btn {
            padding: 15px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #check-btn:hover { background-color: #2ecc71; }
        .feedback {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            height: 40px;
        }
        .feedback.correct {
            color: #27ae60;
        }
        .feedback.incorrect {
            color: #c0392b;
        }
        .score {
            font-size: 1.2em;
            color: #555;
            margin-top: 10px;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 1.5em;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #start-btn:hover { background-color: #2980b9; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1 class="title-magic">Magic Dictation</h1>
            <p>Listen to the word and write it! Show off your spelling powers!</p>
            
            <div class="level-selector">
                <label for="level">Choose your magic level:</label>
                <select id="level">
                    <option value="0">Apprentice (1st Grade)</option>
                    <option value="1">Sorcerer (2nd Grade)</option>
                    <option value="2">Mage (3rd Grade)</option>
                    <option value="3">Archmage (4th Grade)</option>
                    <option value="4">Master (5th Grade)</option>
                    <option value="5">Grandmaster (6th Grade)</option>
                </select>
            </div>

            <button id="start-btn">Start!</button>

            <div id="game-area" class="hidden">
                <div class="dictation-controls">
                    <button id="listen-btn" title="Listen again"><i class="fas fa-volume-up"></i></button>
                </div>

                <div class="answer-section">
                    <input type="text" id="answer" placeholder="Write the magic word here...">
                    <button id="check-btn"><i class="fas fa-check"></i> Check</button>
                </div>

                <div id="feedback" class="feedback"></div>
                <div id="score" class="score">Correct: 0 of 0</div>
            </div>

            <div class="back-button-container">
                <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const wordLists = [
                // 1st Grade (English)
                ['sun', 'moon', 'table', 'soup', 'bear', 'duck', 'cat', 'hand', 'finger', 'eye', 'sea', 'bread', 'salt', 'light', 'flower'],
                // 2nd Grade
                ['car', 'dog', 'school', 'apple', 'orange', 'banana', 'family', 'friend', 'play', 'run', 'book', 'pencil', 'water', 'fruit', 'green'],
                // 3rd Grade
                ['computer', 'library', 'dictionary', 'planet', 'universe', 'smart', 'responsibility', 'communication', 'transport', 'electricity', 'guitar', 'elephant', 'butterfly', 'chocolate', 'adventure'],
                // 4th Grade
                ['telephone', 'pen', 'nature', 'exercise', 'bright', 'vehicle', 'excursion', 'atmosphere', 'notebook', 'mathematics', 'hippopotamus', 'bicycle', 'television', 'tool', 'temperature'],
                // 5th Grade
                ['helicopter', 'research', 'technology', 'vocabulary', 'geography', 'awareness', 'exceptional', 'benevolent', 'hypothesis', 'architecture', 'democracy', 'parallelepiped', 'otolaryngologist', 'appliance'],
                // 6th Grade
                ['consequence', 'philosophy', 'extraordinary', 'archaeology', 'sustainability', 'metamorphosis', 'infrastructure', 'constitutional', 'paradigm', 'spectroscopy', 'onomatopoeia', 'idiosyncrasy', 'procrastinate', 'resilience', 'ephemeris']
            ];

            let currentWord = '';
            let score = 0;
            let total = 0;
            let speech;

            const levelSelect = document.getElementById('level');
            const startBtn = document.getElementById('start-btn');
            const gameArea = document.getElementById('game-area');
            const listenBtn = document.getElementById('listen-btn');
            const checkBtn = document.getElementById('check-btn');
            const answerInput = document.getElementById('answer');
            const feedbackDiv = document.getElementById('feedback');
            const scoreDiv = document.getElementById('score');

            function initializeSpeech() {
                speech = new SpeechSynthesisUtterance();
                speech.lang = 'en-US';
                speech.rate = 0.8;
            }

            function speak(text) {
                if (!speechSynthesis.speaking) {
                    if (!speech) {
                        initializeSpeech();
                    }
                    speech.text = text;
                    speechSynthesis.speak(speech);
                }
            }

            function nextWord() {
                const level = levelSelect.value;
                const words = wordLists[level];
                const randomIndex = Math.floor(Math.random() * words.length);
                currentWord = words[randomIndex];
                
                feedbackDiv.textContent = '';
                answerInput.value = '';
                answerInput.focus();
                
                setTimeout(() => speak(currentWord), 300);
            }

            function checkAnswer() {
                const userAnswer = answerInput.value.trim().toLowerCase();
                if (!userAnswer) return;

                total++;

                if (userAnswer === currentWord) {
                    score++;
                    feedbackDiv.innerHTML = '<i class="fas fa-star"></i> Correct! <i class="fas fa-star"></i>';
                    feedbackDiv.className = 'feedback correct';
                } else {
                    feedbackDiv.innerHTML = `<i class="fas fa-times"></i> Incorrect. The word was: <strong>${currentWord}</strong>`;
                    feedbackDiv.className = 'feedback incorrect';
                }

                scoreDiv.textContent = `Correct: ${score} of ${total}`;
                
                checkBtn.disabled = true;

                setTimeout(() => {
                    nextWord();
                    checkBtn.disabled = false;
                }, 2500);
            }

            startBtn.addEventListener('click', () => {
                startBtn.classList.add('hidden');
                levelSelect.disabled = true;
                gameArea.classList.remove('hidden');
                initializeSpeech();
                nextWord();
            });

            listenBtn.addEventListener('click', () => {
                if (currentWord) {
                    speak(currentWord);
                }
            });
            
            checkBtn.addEventListener('click', checkAnswer);
            
            answerInput.addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    checkAnswer();
                }
            });

            levelSelect.addEventListener('change', () => {
                score = 0;
                total = 0;
                scoreDiv.textContent = `Correct: ${score} of ${total}`;
                feedbackDiv.textContent = '';
                currentWord = '';
            });
        });
    </script>

</body>
</html>
