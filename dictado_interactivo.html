<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictado Interactivo</title>
    <link rel="stylesheet" href="css/herramienta_style.css">
</head>
<body>
    <header>
        <img src="images/escudo1.png" alt="Logo Escuela" class="logo">
        <div class="header-text">
            <h1>Escuela Primaria Ignacio Zaragoza</h1>
            <h2>Asociación de Padres de Familia</h2>
            <p class="header-periodo">Gestión 2025-2026</p>
        </div>
    </header>

    <div class="container">
        <h1>Dictado Interactivo</h1>
        
        <div class="level-selector">
            <label for="level">Elige el nivel: </label>
            <select id="level">
                <option value="0">1er Grado</option>
                <option value="1">2º Grado</option>
                <option value="2">3er Grado</option>
                <option value="3">4º Grado</option>
                <option value="4">5º Grado</option>
                <option value="5">6º Grado</option>
            </select>
        </div>

        <div class="dictation-controls">
            <button id="listen-btn">&#128266;</button>
        </div>

        <div class="answer-section">
            <input type="text" id="answer" placeholder="Escribe aquí lo que escuchaste">
            <button id="check-btn">Revisar</button>
        </div>

        <div id="feedback" class="feedback"></div>
        <div id="score" class="score">Aciertos: 0 de 0</div>
        
        <div class="back-button-container">
             <a href="recursos_apoyo.html" class="btn-regresar">Volver a Recursos de Apoyo</a>
        </div>
    </div>

    <script>
        const wordLists = [
            // 1er Grado
            ['sol', 'luna', 'mesa', 'sopa', 'oso', 'pato', 'gato', 'mano', 'dedo', 'ojo'],
            // 2º Grado
            ['carro', 'perro', 'escuela', 'manzana', 'naranja', 'plátano', 'familia', 'amigo', 'jugar', 'correr'],
            // 3er Grado
            ['computadora', 'biblioteca', 'diccionario', 'planeta', 'universo', 'inteligente', 'responsabilidad', 'comunicación', 'transporte', 'electricidad'],
            // 4º Grado
            ['teléfono', 'bolígrafo', 'naturaleza', 'ejercicio', 'brillante', 'vehículo', 'excursión', 'atmósfera', 'cuaderno', 'matemáticas'],
            // 5º Grado
            ['helicóptero', 'investigación', 'tecnología', 'vocabulario', 'geografía', 'conciencia', 'excepcional', 'herramienta', 'benevolente', 'hipótesis'],
            // 6º Grado
            ['consecuencia', 'filosofía', 'extraordinario', 'arqueología', 'sostenibilidad', 'metamorfosis', 'infraestructura', 'constitucional', 'paradigma', 'espectroscopia']
        ];

        let currentWord = '';
        let score = 0;
        let total = 0;

        const levelSelect = document.getElementById('level');
        const listenBtn = document.getElementById('listen-btn');
        const checkBtn = document.getElementById('check-btn');
        const answerInput = document.getElementById('answer');
        const feedbackDiv = document.getElementById('feedback');
        const scoreDiv = document.getElementById('score');

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            speechSynthesis.speak(utterance);
        }

        function nextWord() {
            const level = levelSelect.value;
            const words = wordLists[level];
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            
            feedbackDiv.textContent = '';
            answerInput.value = '';
            answerInput.focus();
            
            speak(currentWord);
        }

        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            total++;

            if (userAnswer === currentWord) {
                score++;
                feedbackDiv.textContent = '¡Correcto!';
                feedbackDiv.className = 'feedback correct';
            } else {
                feedbackDiv.textContent = `Incorrecto. La palabra era: "${currentWord}"`;
                feedbackDiv.className = 'feedback incorrect';
            }

            scoreDiv.textContent = `Aciertos: ${score} de ${total}`;
            
            setTimeout(() => {
                nextWord();
            }, 2000);
        }

        listenBtn.addEventListener('click', () => {
            if (currentWord) {
                speak(currentWord);
            } else {
                nextWord();
            }
        });
        
        checkBtn.addEventListener('click', checkAnswer);
        
        answerInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        });

        levelSelect.addEventListener('change', () => {
            score = 0;
            total = 0;
            scoreDiv.textContent = `Aciertos: ${score} de ${total}`;
            feedbackDiv.textContent = '';
            currentWord = '';
        });

    </script>

</body>
</html>
