<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictado Mágico</title>
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #333;
            margin: 0;
        }
        header {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        .header-text h1, .header-text h2 {
            color: #0056b3;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            margin: 20px auto;
            text-align: center;
            border: 3px solid #fff;
        }
        h1.title-magic {
            font-family: 'Comic Neue', cursive;
            color: #6a11cb;
            margin-bottom: 20px;
            font-size: 2.8em;
        }
        .level-selector {
            margin-bottom: 20px;
        }
        .level-selector label {
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
        }
        .level-selector select {
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.1em;
            margin-left: 10px;
        }
        .dictation-controls button {
            background-color: #8e44ad;
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 2.5em;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .dictation-controls button:hover {
            background-color: #9b59b6;
            transform: scale(1.1);
        }
        .answer-section {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        #answer {
            flex-grow: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.2em;
        }
        #check-btn {
            padding: 15px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #check-btn:hover { background-color: #2ecc71; }
        .feedback {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            height: 40px;
        }
        .feedback.correct {
            color: #27ae60;
        }
        .feedback.incorrect {
            color: #c0392b;
        }
        .score {
            font-size: 1.2em;
            color: #555;
            margin-top: 10px;
        }
        .home-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .home-button:hover { background-color: #5a6268; }
        #start-btn {
            padding: 20px 40px;
            font-size: 1.5em;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #start-btn:hover { background-color: #2980b9; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <img src="images/escudo1.png" alt="Logo Escuela" class="logo">
        <div class="header-text">
            <h1>Escuela Primaria Ignacio Zaragoza</h1>
            <h2>Asociación de Padres de Familia</h2>
            <p class="header-periodo">Gestión 2025-2026</p>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="title-magic">Dictado Mágico</h1>
            <p>¡Escucha la palabra y escríbela! ¡Demuestra tus poderes de ortografía!</p>
            
            <div class="level-selector">
                <label for="level">Elige tu nivel de magia:</label>
                <select id="level">
                    <option value="0">Aprendiz (1er Grado)</option>
                    <option value="1">Hechicero (2º Grado)</option>
                    <option value="2">Mago (3er Grado)</option>
                    <option value="3">Archimago (4º Grado)</option>
                    <option value="4">Maestro (5º Grado)</option>
                    <option value="5">Gran Maestro (6º Grado)</option>
                </select>
            </div>

            <button id="start-btn">¡Comenzar!</button>

            <div id="game-area" class="hidden">
                <div class="dictation-controls">
                    <button id="listen-btn" title="Escuchar de nuevo"><i class="fas fa-volume-up"></i></button>
                </div>

                <div class="answer-section">
                    <input type="text" id="answer" placeholder="Escribe la palabra mágica aquí...">
                    <button id="check-btn"><i class="fas fa-check"></i> Revisar</button>
                </div>

                <div id="feedback" class="feedback"></div>
                <div id="score" class="score">Aciertos: 0 de 0</div>
            </div>

            <a href="recursos_apoyo.html" class="home-button"><i class="fas fa-home"></i> Volver a Recursos</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Asociación de Padres de Familia. ¡La ortografía es un superpoder!</p>
    </footer>

    <script>
        const wordLists = [
            // 1er Grado
            ['sol', 'luna', 'mesa', 'sopa', 'oso', 'pato', 'gato', 'mano', 'dedo', 'ojo', 'mar', 'pan', 'sal', 'luz', 'flor'],
            // 2º Grado
            ['carro', 'perro', 'escuela', 'manzana', 'naranja', 'plátano', 'familia', 'amigo', 'jugar', 'correr', 'libro', 'lápiz', 'agua', 'fruta', 'verde'],
            // 3er Grado
            ['computadora', 'biblioteca', 'diccionario', 'planeta', 'universo', 'inteligente', 'responsabilidad', 'comunicación', 'transporte', 'electricidad', 'guitarra', 'elefante', 'mariposa', 'chocolate', 'aventura'],
            // 4º Grado
            ['teléfono', 'bolígrafo', 'naturaleza', 'ejercicio', 'brillante', 'vehículo', 'excursión', 'atmósfera', 'cuaderno', 'matemáticas', 'hipopótamo', 'bicicleta', 'televisión', 'herramienta', 'temperatura'],
            // 5º Grado
            ['helicóptero', 'investigación', 'tecnología', 'vocabulario', 'geografía', 'conciencia', 'excepcional', 'herramienta', 'benevolente', 'hipótesis', 'arquitectura', 'democracia', 'paralelepípedo', 'otorrinolaringólogo', 'electrodoméstico'],
            // 6º Grado
            ['consecuencia', 'filosofía', 'extraordinario', 'arqueología', 'sostenibilidad', 'metamorfosis', 'infraestructura', 'constitucional', 'paradigma', 'espectroscopia', 'onomatopeya', 'idiosincrasia', 'procrastinar', 'resiliencia', 'efemérides']
        ];

        let currentWord = '';
        let score = 0;
        let total = 0;
        let speech;

        const levelSelect = document.getElementById('level');
        const startBtn = document.getElementById('start-btn');
        const gameArea = document.getElementById('game-area');
        const listenBtn = document.getElementById('listen-btn');
        const checkBtn = document.getElementById('check-btn');
        const answerInput = document.getElementById('answer');
        const feedbackDiv = document.getElementById('feedback');
        const scoreDiv = document.getElementById('score');

        function initializeSpeech() {
            speech = new SpeechSynthesisUtterance();
            speech.lang = 'es-ES';
            speech.rate = 0.8;
        }

        function speak(text) {
            if (!speech) {
                initializeSpeech();
            }
            speech.text = text;
            speechSynthesis.speak(speech);
        }

        function nextWord() {
            const level = levelSelect.value;
            const words = wordLists[level];
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            
            feedbackDiv.textContent = '';
            answerInput.value = '';
            answerInput.focus();
            
            // Pequeño retraso para que el usuario se prepare
            setTimeout(() => speak(currentWord), 300);
        }

        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            if (!userAnswer) return; // No hacer nada si la respuesta está vacía

            total++;

            if (userAnswer === currentWord) {
                score++;
                feedbackDiv.innerHTML = '<i class="fas fa-star"></i> ¡Correcto! <i class="fas fa-star"></i>';
                feedbackDiv.className = 'feedback correct';
            } else {
                feedbackDiv.innerHTML = `<i class="fas fa-times"></i> Incorrecto. La palabra era: <strong>${currentWord}</strong>`;
                feedbackDiv.className = 'feedback incorrect';
            }

            scoreDiv.textContent = `Aciertos: ${score} de ${total}`;
            
            // Deshabilitar el botón de revisar para evitar envíos múltiples
            checkBtn.disabled = true;

            setTimeout(() => {
                nextWord();
                checkBtn.disabled = false; // Rehabilitar el botón
            }, 2500);
        }

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            levelSelect.disabled = true; // Bloquear el nivel una vez que empieza el juego
            gameArea.classList.remove('hidden');
            initializeSpeech(); // Inicializar la API de voz con un gesto del usuario
            nextWord();
        });

        listenBtn.addEventListener('click', () => {
            if (currentWord) {
                speak(currentWord);
            }
        });
        
        checkBtn.addEventListener('click', checkAnswer);
        
        answerInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        });

        levelSelect.addEventListener('change', () => {
            score = 0;
            total = 0;
            scoreDiv.textContent = `Aciertos: ${score} de ${total}`;
            feedbackDiv.textContent = '';
            currentWord = '';
        });

    </script>

</body>
</html>
