<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wilhelm Wundt Institute</title>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Plataforma de Apoyo - Instituto Wilhelm Wundt">
    <meta property="og:description" content="Herramientas y recursos educativos para la comunidad académica del Instituto Wilhelm Wundt.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Marcorepositorioprueba/instituto-wil-platform/master/willogo.jpg">
    <meta property="og:url" content="https://Marcorepositorioprueba.github.io/instituto-wil-platform/">
    <meta property="og:type" content="website">
    <!-- Fin de Meta Tags -->

    <link rel="stylesheet" href="css/login_styles.css">
    <style>
        /* Estilos adicionales para asegurar que el logo se vea bien */
        .hero-logo {
            background-color: white; /* Fondo blanco para el logo */
            padding: 10px;
            border-radius: 50%; /* Forma circular si el logo es cuadrado */
        }
    </style>
</head>
<body>

    <div class="hero-container-dynamic">
        <!-- Slides de fondo -->
        <div class="hero-background-slide"></div>
        <div class="hero-background-slide"></div>

        <!-- Contenido superpuesto -->
        <div class="hero-overlay">
            <div class="hero-content">
                <div class="light-sweep">
                    <!-- El logo del instituto se insertará aquí -->
                    <img src="willogo.jpg" alt="Institute Logo" class="hero-logo">
                    <h1>Wilhelm Wundt Institute</h1>
                </div>
                <p id="illuminated-text" class="illuminated-text">Transforming education for the future.</p>
                
                <form class="login-form" id="login-form">
                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="hero-button">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Animación de texto ---
            const textElement = document.getElementById('illuminated-text');
            const text = textElement.innerText;
            textElement.innerHTML = ''; // Limpiar

            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.innerText = text[i] === ' ' ? '\u00A0' : text[i];
                textElement.appendChild(span);
            }

            const spans = textElement.querySelectorAll('span');
            const delay = 100;

            function illuminate() {
                spans.forEach((span, index) => {
                    setTimeout(() => {
                        span.classList.add('illuminated');
                    }, index * delay);
                });

                setTimeout(() => {
                    spans.forEach(span => span.classList.remove('illuminated'));
                }, (spans.length * delay) + 3000);
            }

            illuminate();
            setInterval(illuminate, (spans.length * delay) + 4000);

            // --- Simulación de Login ---
            const loginForm = document.getElementById('login-form');
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Prevenir el envío real del formulario
                // Redirigir al dashboard
                window.location.href = 'dashboard.html';
            });
        });
    </script>

</body>
</html>
