<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maternal - Magic Box of Textures & Colors - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <style>
        .magic-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 900px;
            margin: 30px auto;
            background-color: var(--wundt-white);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        #textureColorDisplay {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--wundt-text);
            margin-bottom: 30px;
            min-height: 60px;
            text-align: center;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .texture-color-tile {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .texture-color-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .texture-color-tile.active {
            animation: pulse-tile 0.5s ease-in-out;
        }

        .color-red { background-color: #e74c3c; }
        .color-blue { background-color: #3498db; }
        .color-green { background-color: #2ecc71; }
        .color-yellow { background-color: #f1c40f; }

        .texture-smooth { }
        .texture-rough {
            background-image: linear-gradient(45deg, rgba(0,0,0,.2) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.2) 75%, rgba(0,0,0,.2)),
                            linear-gradient(45deg, rgba(0,0,0,.2) 25%, transparent 25%, transparent 75%, rgba(0,0,0,.2) 75%, rgba(0,0,0,.2));
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
        }
        .texture-soft {
            background-image: radial-gradient(circle, rgba(255,255,255,.3) 10%, transparent 10%),
                            radial-gradient(circle, rgba(255,255,255,.3) 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .texture-hard {
            background-image: linear-gradient(to right, rgba(0,0,0,.2) 1px, transparent 1px),
                            linear-gradient(to bottom, rgba(0,0,0,.2) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        @keyframes pulse-tile {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <section id="maternal-magic-box">
            <h2>Magic Box of Textures & Colors</h2>
            <p style="text-align: center; font-size: 1.1em; color: #555; margin-bottom: 30px;">Touch the squares to discover their textures and colors!</p>

            <div class="magic-box-container">
                <div id="textureColorDisplay">Touch a square</div>
                <div class="tiles-grid">
                    <div class="texture-color-tile color-red texture-smooth" data-name="Smooth and Red"></div>
                    <div class="texture-color-tile color-blue texture-rough" data-name="Rough and Blue"></div>
                    <div class="texture-color-tile color-green texture-soft" data-name="Soft and Green"></div>
                    <div class="texture-color-tile color-yellow texture-hard" data-name="Hard and Yellow"></div>
                    <div class="texture-color-tile color-blue texture-smooth" data-name="Smooth and Blue"></div>
                    <div class="texture-color-tile color-red texture-soft" data-name="Soft and Red"></div>
                    <div class="texture-color-tile color-yellow texture-rough" data-name="Rough and Yellow"></div>
                    <div class="texture-color-tile color-green texture-hard" data-name="Hard and Green"></div>
                </div>
            </div>
             <div class="back-button-container">
                <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const tiles = document.querySelectorAll('.texture-color-tile');
            const display = document.getElementById('textureColorDisplay');
            const synth = window.speechSynthesis;

            tiles.forEach(tile => {
                tile.addEventListener('click', () => {
                    tiles.forEach(t => t.classList.remove('active'));
                    tile.classList.add('active');
                    
                    const name = tile.dataset.name;
                    display.textContent = name;

                    if (synth.speaking) {
                        synth.cancel();
                    }
                    const utterThis = new SpeechSynthesisUtterance(name);
                    utterThis.lang = 'en-US';
                    synth.speak(utterThis);
                });
            });
        });
    </script>
</body>
</html>
