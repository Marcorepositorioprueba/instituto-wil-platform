<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maternal - Animal Sounds - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <style>
        .animal-sounds-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 900px;
            margin: 30px auto;
            background-color: var(--wundt-white);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 25px;
            width: 100%;
            justify-content: center;
        }

        .animal-card {
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }

        .animal-card:hover {
            transform: scale(1.05);
        }

        .animal-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid var(--wundt-gray-medium);
        }

        .animal-card.playing img {
            border-color: var(--wundt-yellow);
            animation: pulse-border 1s ease-in-out;
        }

        .animal-card h3 {
            margin-top: 10px;
            color: var(--wundt-text);
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(241, 196, 15, 0); }
            100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <section id="maternal-animal-sounds">
            <h2>Animal Sounds</h2>
            <p style="text-align: center; font-size: 1.1em; color: #555; margin-bottom: 30px;">Click on an animal to hear its sound!</p>

            <div class="animal-sounds-container">
                <div class="animal-grid" id="animalGrid">
                    </div>
            </div>
            <div class="back-button-container">
                <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const animals = [
                { name: 'Dog', image: 'images/dog.jpg', sound: 'sounds/dog.mp3' },
                { name: 'Cat', image: 'images/cat.jpg', sound: 'sounds/cat.mp3' },
                { name: 'Cow', image: 'images/cow.jpg', sound: 'sounds/cow.mp3' },
                { name: 'Lion', image: 'images/lion.jpg', sound: 'sounds/lion.mp3' },
                { name: 'Sheep', image: 'images/sheep.jpg', sound: 'sounds/sheep.mp3' },
                { name: 'Horse', image: 'images/horse.jpg', sound: 'sounds/horse.mp3' }
            ];

            const animalGrid = document.getElementById('animalGrid');
            let currentlyPlaying = null;

            animals.forEach(animal => {
                const card = document.createElement('div');
                card.classList.add('animal-card');
                
                const img = document.createElement('img');
                img.src = animal.image;
                img.alt = animal.name;
                
                const name = document.createElement('h3');
                name.textContent = animal.name;

                card.appendChild(img);
                card.appendChild(name);

                const audio = new Audio(animal.sound);
                audio.onended = () => {
                    card.classList.remove('playing');
                    currentlyPlaying = null;
                };

                card.addEventListener('click', () => {
                    if (currentlyPlaying) {
                        currentlyPlaying.pause();
                        currentlyPlaying.currentTime = 0;
                    }
                    audio.play().catch(e => console.error("Audio play failed:", e));
                    document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('playing'));
                    card.classList.add('playing');
                    currentlyPlaying = audio;
                });

                animalGrid.appendChild(card);
            });
        });
    </script>
</body>
</html>
