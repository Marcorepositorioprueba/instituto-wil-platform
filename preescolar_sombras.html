<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preschool - Match the Shadows - Wilhelm Wundt Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <style>
        .shadow-match-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 900px;
            margin: 30px auto;
            background-color: var(--wundt-white);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .game-area {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .objects-container, .shadows-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            min-height: 250px;
            flex: 1;
            margin: 10px;
        }

        .draggable-object {
            width: 100px;
            height: 100px;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .draggable-object img {
            max-width: 80%;
            max-height: 80%;
            pointer-events: none;
        }

        .shadow-target {
            width: 100px;
            height: 100px;
            background-color: #eee;
            border: 2px solid #999;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .shadow-target img {
            max-width: 80%;
            max-height: 80%;
            filter: brightness(0) invert(0.5);
            opacity: 0.5;
        }

        .shadow-target.matched {
            background-color: #d4edda;
            border-color: #28a745;
        }
        
        .draggable-object.dragging {
            opacity: 0.5;
        }

        .feedback-message {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <header>
        <img src="willogo.jpg" alt="Wilhelm Wundt Institute Logo" class="logo">
        <div class="header-text">
            <h1>Wilhelm Wundt Institute</h1>
        </div>
    </header>

    <nav class="main-nav">
        <button class="hamburger-menu" id="hamburger-menu">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html" class="nav-button">Home</a>
            <a href="#" class="nav-button">Academic Calendar</a>
            <a href="dashboard.html" class="nav-button active">Teacher Resources</a>
            <a href="#" class="nav-button">Communications</a>
            <a href="#" class="nav-button">Directory</a>
            <a href="#" class="nav-button">Profile</a>
        </div>
    </nav>

    <main>
        <section id="preescolar-shadow-match">
            <h2>Match the Shadows</h2>
            <p style="text-align: center; font-size: 1.1em; color: #555; margin-bottom: 30px;">Drag each object to its correct shadow!</p>

            <div class="shadow-match-container">
                <div class="game-area">
                    <div class="objects-container" id="objectsContainer"></div>
                    <div class="shadows-container" id="shadowsContainer"></div>
                </div>
                <div id="feedbackMessage" class="feedback-message"></div>
            </div>
            <div class="back-button-container">
                <a href="dashboard.html" class="back-button"><i class="fas fa-arrow-left"></i> Back to Resources</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wilhelm Wundt Institute. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger-menu');
            const navLinks = document.getElementById('nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => navLinks.classList.toggle('show'));
            }

            const objects = [
                { id: 'apple', src: 'images/apple.png', alt: 'Apple' },
                { id: 'car', src: 'images/car.png', alt: 'Car' },
                { id: 'star', src: 'images/star.png', alt: 'Star' }
            ];

            const objectsContainer = document.getElementById('objectsContainer');
            const shadowsContainer = document.getElementById('shadowsContainer');
            const feedbackMessage = document.getElementById('feedbackMessage');

            let draggedItem = null;

            function shuffle(array) {
                array.sort(() => Math.random() - 0.5);
            }

            function initializeGame() {
                objectsContainer.innerHTML = '';
                shadowsContainer.innerHTML = '';
                feedbackMessage.textContent = '';
                
                let shuffledObjects = [...objects];
                shuffle(shuffledObjects);
                
                let shuffledShadows = [...objects];
                shuffle(shuffledShadows);

                shuffledObjects.forEach(obj => {
                    const div = document.createElement('div');
                    div.classList.add('draggable-object');
                    div.dataset.object = obj.id;
                    div.draggable = true;
                    div.innerHTML = `<img src="${obj.src}" alt="${obj.alt}">`;
                    objectsContainer.appendChild(div);
                });

                shuffledShadows.forEach(obj => {
                    const div = document.createElement('div');
                    div.classList.add('shadow-target');
                    div.dataset.shadow = obj.id;
                    div.innerHTML = `<img src="${obj.src}" alt="Shadow of ${obj.alt}">`;
                    shadowsContainer.appendChild(div);
                });

                addDragListeners();
            }

            function addDragListeners() {
                const draggables = document.querySelectorAll('.draggable-object');
                const targets = document.querySelectorAll('.shadow-target');

                draggables.forEach(draggable => {
                    draggable.addEventListener('dragstart', () => {
                        draggedItem = draggable;
                        draggable.classList.add('dragging');
                    });

                    draggable.addEventListener('dragend', () => {
                        draggable.classList.remove('dragging');
                        draggedItem = null;
                    });
                });

                targets.forEach(target => {
                    target.addEventListener('dragover', e => {
                        e.preventDefault();
                    });

                    target.addEventListener('drop', () => {
                        if (target.classList.contains('matched')) return;

                        if (draggedItem.dataset.object === target.dataset.shadow) {
                            target.classList.add('matched');
                            target.innerHTML = '';
                            target.appendChild(draggedItem.querySelector('img').cloneNode());
                            draggedItem.style.visibility = 'hidden';
                            feedbackMessage.textContent = 'Correct!';
                            feedbackMessage.style.color = '#28a745';
                            checkWin();
                        } else {
                            feedbackMessage.textContent = 'Try again!';
                            feedbackMessage.style.color = '#dc3545';
                        }
                    });
                });
            }

            function checkWin() {
                const matchedTargets = document.querySelectorAll('.shadow-target.matched').length;
                if (matchedTargets === objects.length) {
                    feedbackMessage.textContent = 'Congratulations, you matched all the shadows!';
                    feedbackMessage.style.color = '#28a745';
                }
            }

            initializeGame();
        });
    </script>
</body>
</html>
