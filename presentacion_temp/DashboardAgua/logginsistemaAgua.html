<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard SistemaAgua</title>
    <!-- Open Graph Meta Tags for Social Media Sharing -->
    <meta property="og:title" content="Dashboard de Consumo de Agua (Demo)">
    <meta property="og:description" content="Accede a la demostración interactiva del Dashboard de Consumo de Agua.">
    <meta property="og:image" content="imagagua/agua.jpg"> <!-- This path will need to be absolute after deployment -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #00796b;
        }
        .login-header img {
            max-width: 150px; /* Set a max-width for consistency */
            height: auto; /* Allow height to adjust proportionally */
            border-radius: 10px; /* Add rounded corners for attractiveness */
            margin-bottom: 15px;
        }
        .login-header h1 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
            color: #333;
            font-weight: 700;
        }
        .login-header p {
            margin: 0 0 30px 0;
            color: #6c757d;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00796b;
            box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.1);
        }
        #btn-login {
            background-color: #00796b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            width: 100%;
            transition: background-color 0.3s ease;
        }
        #btn-login:hover {
            background-color: #004d40;
        }
        #error-message {
            color: #dc3545;
            margin-top: 15px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="imagagua/agua.jpg" alt="Imagen de Agua">
            <h1>Análisis de Consumo APF</h1>
            <p>Monitoreo y análisis del consumo de agua</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="btn-login">Ingresar</button>
            <p id="error-message"></p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Credenciales hardcodeadas
            const validUser = 'ig';
            const validPass = 'agua';

            if (username === validUser && password === validPass) {
                // Redirección al dashboard
                window.location.href = 'SistemaAgua.html';
            } else {
                // Mensaje de error
                errorMessage.textContent = 'Usuario o contraseña incorrectos.';
            }
        });
    </script>
</body>
</html>
